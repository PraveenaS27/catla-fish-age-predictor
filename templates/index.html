<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Catla Fish Age Predictor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; padding: 40px 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 10px; font-size: 32px; }
    p.subtitle { text-align: center; color: #666; margin-bottom: 40px; font-size: 15px; }
    
    .upload-box { 
      border: 3px dashed #ccc; border-radius: 16px; padding: 60px; 
      text-align: center; background: white; cursor: pointer; transition: 0.3s; 
    }
    .upload-box:hover { border-color: #333; background: #fafafa; }
    .upload-box .icon { font-size: 50px; margin-bottom: 15px; }
    #fileInput { display: none; }
    
    .results { display: none; margin-top: 30px; gap: 20px; }
    .results.show { display: flex; flex-wrap: wrap; }
    
    .card { 
      flex: 1; min-width: 300px; background: white; border-radius: 12px; 
      border: 1px solid #ddd; overflow: hidden; 
    }
    .card-header { 
      padding: 15px; background: #f9f9f9; border-bottom: 1px solid #ddd; 
      font-weight: bold; font-size: 13px; text-transform: uppercase; color: #666; 
    }
    .card-body { padding: 20px; }
    .preview-img { width: 100%; max-height: 280px; object-fit: contain; border-radius: 8px; background: #eee; }
    
    .prediction { text-align: center; margin-bottom: 25px; }
    .prediction .label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
    .prediction .age { font-size: 44px; font-weight: 900; color: #1a1a1a; margin: 10px 0; }
    .prediction .conf { font-size: 14px; color: #666; }
    
    .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .bar-label { width: 110px; font-weight: bold; font-size: 13px; color: #555; text-align: right; }
    .bar-track { flex: 1; height: 24px; background: #eee; border-radius: 6px; overflow: hidden; }
    .bar-fill { 
      height: 100%; border-radius: 6px; display: flex; align-items: center; 
      justify-content: flex-end; padding-right: 10px; transition: width 0.5s ease; 
    }
    .bar-fill span { color: white; font-size: 11px; font-weight: bold; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }
    .bar-fill.green { background: #22c55e; }
    .bar-fill.blue { background: #3b82f6; }
    
    .btn-row { display: flex; gap: 10px; justify-content: center; margin-top: 25px; }
    button { padding: 12px 24px; border-radius: 8px; border: none; font-size: 14px; font-weight: bold; cursor: pointer; }
    .btn-predict { background: #1a1a1a; color: white; }
    .btn-predict:hover { opacity: 0.85; }
    .btn-predict:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-clear { background: white; color: #333; border: 1px solid #ddd; }
    .btn-clear:hover { background: #f5f5f5; }
    
    .spinner { 
      display: none; width: 16px; height: 16px; border: 2px solid #ddd; 
      border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; 
      margin-right: 8px; vertical-align: middle; 
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .error { color: #dc2626; text-align: center; margin-top: 15px; display: none; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🐟 Catla Fish Age Predictor</h1>
    <p class="subtitle">Upload a fish image to predict its age</p>
    
    <div class="upload-box" id="uploadBox">
      <div class="icon">📤</div>
      <p><strong>Click to upload</strong> or drag & drop</p>
      <p style="font-size: 12px; color: #999; margin-top: 8px;">JPG, PNG — up to 10MB</p>
      <input type="file" id="fileInput" accept="image/*">
    </div>
    
    <div class="error" id="errorMsg"></div>
    
    <div class="results" id="results">
      <div class="card">
        <div class="card-header">Uploaded Image</div>
        <div class="card-body">
          <img id="previewImg" class="preview-img" src="" alt="Fish image">
        </div>
      </div>
      <div class="card">
        <div class="card-header">Prediction Results</div>
        <div class="card-body">
          <div class="prediction">
            <div class="label">Predicted Age</div>
            <div class="age" id="predAge">--</div>
            <div class="conf" id="predConf">Click Predict to analyze</div>
          </div>
          <div id="probBars"></div>
          <div class="btn-row">
            <button class="btn-predict" id="predictBtn" onclick="doPredict()">
              <span class="spinner" id="spinner"></span>Predict Age
            </button>
            <button class="btn-clear" onclick="doReset()">Clear</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const uploadBox = document.getElementById('uploadBox');
    const fileInput = document.getElementById('fileInput');
    const results = document.getElementById('results');
    const previewImg = document.getElementById('previewImg');
    const predAge = document.getElementById('predAge');
    const predConf = document.getElementById('predConf');
    const probBars = document.getElementById('probBars');
    const predictBtn = document.getElementById('predictBtn');
    const spinner = document.getElementById('spinner');
    const errorMsg = document.getElementById('errorMsg');
    let currentFile = null;

    uploadBox.addEventListener('click', () => fileInput.click());
    uploadBox.addEventListener('dragover', e => { e.preventDefault(); uploadBox.style.borderColor = '#333'; });
    uploadBox.addEventListener('dragleave', () => { uploadBox.style.borderColor = '#ccc'; });
    uploadBox.addEventListener('drop', e => { 
      e.preventDefault(); uploadBox.style.borderColor = '#ccc'; 
      if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); 
    });
    fileInput.addEventListener('change', e => { if (e.target.files.length) handleFile(e.target.files[0]); });

    function handleFile(file) {
      currentFile = file;
      const reader = new FileReader();
      reader.onload = e => { 
        previewImg.src = e.target.result; 
        results.classList.add('show'); 
        predAge.textContent = '--'; 
        predConf.textContent = 'Click "Predict Age" to analyze'; 
        probBars.innerHTML = ''; 
        errorMsg.style.display = 'none'; 
      };
      reader.readAsDataURL(file);
    }

    function doReset() { 
      results.classList.remove('show'); 
      previewImg.src = ''; 
      fileInput.value = ''; 
      currentFile = null; 
      probBars.innerHTML = ''; 
      errorMsg.style.display = 'none'; 
    }

    async function doPredict() {
      if (!currentFile) return;
      predictBtn.disabled = true; 
      spinner.style.display = 'inline-block'; 
      predConf.textContent = 'Analyzing...'; 
      errorMsg.style.display = 'none';

      const formData = new FormData(); 
      formData.append('image', currentFile);

      try {
        const res = await fetch('/predict', { method: 'POST', body: formData });
        const data = await res.json();
        
        if (!data.success) { 
          throw new Error(data.error || 'Prediction failed'); 
        }
        
        const p = data.prediction;
        predAge.textContent = p.age_label;
        predConf.textContent = `Confidence: ${p.confidence}% | Top-2: ${p.top2_confidence}%`;
        
        // ONLY SHOW TOP 2 PROBABILITIES
        const top2 = p.ranked.slice(0, 2);
        probBars.innerHTML = top2.map((r, i) => {
          const color = i === 0 ? 'green' : 'blue';
          const pct = r.probability.toFixed(2);
          return `
            <div class="bar-row">
              <div class="bar-label">${r.age}</div>
              <div class="bar-track">
                <div class="bar-fill ${color}" style="width: ${Math.max(pct, 1)}%">
                  <span>${pct}%</span>
                </div>
              </div>
            </div>
          `;
        }).join('');

      } catch (err) { 
        errorMsg.textContent = err.message; 
        errorMsg.style.display = 'block'; 
        predConf.textContent = 'Prediction failed'; 
        predAge.textContent = '--'; 
        probBars.innerHTML = ''; 
      } finally { 
        spinner.style.display = 'none'; 
        predictBtn.disabled = false; 
      }
    }
  </script>
</body>
</html>
